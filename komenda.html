<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SWD PSP - Komenda</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  .acc-table { width: 100%; border-collapse: collapse; margin-top: 14px; }
  .acc-table th, .acc-table td { text-align: left; padding: 8px; border-bottom: 1px solid #d6dee1; font-size: 13px; }
  .acc-table th { color: #607078; font-size: 11px; text-transform: uppercase; }
  .acc-table select { padding: 4px; font-size: 12px; }
  .del-btn { background: #c0392b; color: #fff; border: none; border-radius: 3px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .add-card { background: #fff; border: 1px solid #b7c6cc; border-radius: 6px; padding: 14px; margin-top: 16px; }
  .add-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>

<div class="appbar">
  <div>
    <div class="title">Komenda - Panel komendanta</div>
    <div class="sub" id="whoAmI"></div>
  </div>
  <button class="logout" onclick="location.href='index.html'">Wróć do menu</button>
</div>

<div class="screen" style="max-width:720px;">
  <div id="guardMsg" class="empty" style="display:none;">Brak dostępu - zaloguj się jako admin.</div>

  <div id="adminPanel" style="display:none;">

    <h2 style="font-size:16px; color:#14394d;">Dysponuj z CPR</h2>
    <div class="add-card">
      <label>Nazwa zdarzenia</label>
      <input type="text" id="cprNazwa" placeholder="np. Wypadek drogowy DK25">
      <label>Adres</label>
      <input type="text" id="cprAdres" placeholder="Ulica, numer, miejscowość">
      <label>Opis</label>
      <textarea id="cprOpis" placeholder="Dodatkowe informacje"></textarea>
      <label>Kto zadysponowany</label>
      <div class="checks">
        <label class="chip"><input type="checkbox" id="cprStraz"> Straż pożarna</label>
        <label class="chip"><input type="checkbox" id="cprPolicja"> Policja</label>
        <label class="chip"><input type="checkbox" id="cprRatownictwo"> Ratownictwo medyczne</label>
      </div>
      <div style="margin-top:14px;">
        <button class="btn" id="cprSendBtn">Wyślij do MSK (CPR)</button>
      </div>
      <div class="error-text" id="cprMsg" style="display:none;"></div>
    </div>

    <h2 style="font-size:16px; color:#14394d; margin-top:24px;">Konta użytkowników</h2>
    <table class="acc-table" id="accTable">
      <thead>
        <tr><th>Imię</th><th>Nazwisko</th><th>Stopień</th><th>Rola</th><th></th></tr>
      </thead>
      <tbody id="accTableBody"></tbody>
    </table>

    <div class="add-card">
      <h2 style="font-size:14px; color:#14394d; margin-top:0;">Dodaj nowe konto</h2>
      <div class="add-row">
        <div>
          <label>Imię</label>
          <input type="text" id="newImie">
        </div>
        <div>
          <label>Nazwisko</label>
          <input type="text" id="newNazwisko">
        </div>
        <div>
          <label>Stopień</label>
          <select id="newStopien">
            <option>strażak</option>
            <option>starszy strażak</option>
            <option>sekcyjny</option>
            <option>starszy sekcyjny</option>
            <option>młodszy ogniomistrz</option>
            <option>ogniomistrz</option>
            <option>starszy ogniomistrz</option>
            <option>młodszy aspirant</option>
            <option>aspirant</option>
            <option>starszy aspirant</option>
            <option>aspirant sztabowy</option>
            <option>młodszy kapitan</option>
            <option>kapitan</option>
            <option>starszy kapitan</option>
            <option>młodszy brygadier</option>
            <option>brygadier</option>
            <option>starszy brygadier</option>
          </select>
        </div>
        <div>
          <label>Hasło</label>
          <input type="text" id="newHaslo">
        </div>
        <div>
          <label>Rola</label>
          <select id="newRola">
            <option value="user">Użytkownik</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div style="margin-top:14px;">
        <button class="btn" id="addAccBtn">Dodaj konto</button>
      </div>
      <div class="error-text" id="addError" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
const STOPNIE = ["strażak","starszy strażak","sekcyjny","starszy sekcyjny","młodszy ogniomistrz","ogniomistrz",
  "starszy ogniomistrz","młodszy aspirant","aspirant","starszy aspirant","aspirant sztabowy",
  "młodszy kapitan","kapitan","starszy kapitan","młodszy brygadier","brygadier","starszy brygadier"];

let currentUser = null;

document.getElementById('cprSendBtn').addEventListener('click', async () => {
  const nazwa = document.getElementById('cprNazwa').value.trim();
  const adres = document.getElementById('cprAdres').value.trim();
  const opis = document.getElementById('cprOpis').value.trim();
  const strazu = document.getElementById('cprStraz').checked;
  const policja = document.getElementById('cprPolicja').checked;
  const ratownictwo = document.getElementById('cprRatownictwo').checked;
  const msgBox = document.getElementById('cprMsg');
  msgBox.style.display = 'none';

  if (!nazwa) {
    msgBox.textContent = 'Podaj nazwę zdarzenia.';
    msgBox.style.display = 'block';
    return;
  }
  if (!strazu && !policja && !ratownictwo) {
    msgBox.textContent = 'Zaznacz kto ma zostać zadysponowany.';
    msgBox.style.display = 'block';
    return;
  }

  const { error } = await sb.from('cpr_dysponowania').insert({
    nazwa_zdarzenia: nazwa, adres, opis, strazu, policja, ratownictwo
  });
  if (error) {
    msgBox.textContent = 'Błąd wysyłania do MSK: ' + error.message;
    msgBox.style.display = 'block';
    return;
  }

  document.getElementById('cprNazwa').value = '';
  document.getElementById('cprAdres').value = '';
  document.getElementById('cprOpis').value = '';
  document.getElementById('cprStraz').checked = false;
  document.getElementById('cprPolicja').checked = false;
  document.getElementById('cprRatownictwo').checked = false;
  msgBox.style.color = '#2e7d32';
  msgBox.textContent = 'Wysłano do MSK.';
  msgBox.style.display = 'block';
});

async function initGuard() {
  const { data: sessionData } = await sb.auth.getSession();
  if (!sessionData?.session) {
    document.getElementById('guardMsg').style.display = 'block';
    return;
  }
  const { data: profile, error } = await sb
    .from('profiles')
    .select('id, imie, nazwisko, stopien, rola')
    .eq('id', sessionData.session.user.id)
    .single();

  if (error || !profile || profile.rola !== 'admin') {
    document.getElementById('guardMsg').style.display = 'block';
    return;
  }
  currentUser = profile;
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('whoAmI').textContent = 'Zalogowano jako: ' + profile.imie + ' ' + profile.nazwisko + ' (' + profile.stopien + ')';
  loadAccounts();
}
initGuard();

async function loadAccounts() {
  const { data, error } = await sb.from('profiles').select('*').order('nazwisko');
  const tbody = document.getElementById('accTableBody');
  tbody.innerHTML = '';
  if (error) {
    tbody.innerHTML = '<tr><td colspan="5">Błąd wczytywania kont.</td></tr>';
    return;
  }
  data.forEach(acc => {
    const tr = document.createElement('tr');

    const stopienOptions = STOPNIE.map(s =>
      `<option value="${s}" ${s === acc.stopien ? 'selected' : ''}>${s}</option>`
    ).join('');

    tr.innerHTML = `
      <td>${acc.imie}</td>
      <td>${acc.nazwisko}</td>
      <td><select data-id="${acc.id}" class="stopienSelect">${stopienOptions}</select></td>
      <td>${acc.rola}</td>
      <td>
        <button class="del-btn" data-id="${acc.id}" data-action="usun">Usuń</button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.stopienSelect').forEach(sel => {
    sel.addEventListener('change', async () => {
      const id = sel.getAttribute('data-id');
      const { error } = await sb.rpc('admin_update_stopien', { p_profile_id: id, p_stopien: sel.value });
      if (error) alert('Błąd zmiany stopnia: ' + error.message);
    });
  });
  tbody.querySelectorAll('[data-action="usun"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Na pewno usunąć to konto?')) return;
      const id = btn.getAttribute('data-id');
      const { error } = await sb.rpc('admin_delete_account', { p_profile_id: id });
      if (error) { alert('Błąd usuwania: ' + error.message); return; }
      loadAccounts();
    });
  });
}

document.getElementById('addAccBtn').addEventListener('click', async () => {
  const imie = document.getElementById('newImie').value.trim();
  const nazwisko = document.getElementById('newNazwisko').value.trim();
  const stopien = document.getElementById('newStopien').value;
  const haslo = document.getElementById('newHaslo').value;
  const rola = document.getElementById('newRola').value;
  const errEl = document.getElementById('addError');
  errEl.style.display = 'none';

  if (!imie || !nazwisko || !haslo) {
    errEl.textContent = 'Wypełnij imię, nazwisko i hasło.';
    errEl.style.display = 'block';
    return;
  }

  const { data: sessionData } = await sb.auth.getSession();
  const resp = await fetch(sb.supabaseUrl + '/functions/v1/create-account', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + sessionData.session.access_token
    },
    body: JSON.stringify({ imie, nazwisko, stopien, haslo, rola })
  });
  const result = await resp.json();

  if (!resp.ok) {
    errEl.textContent = 'Błąd dodawania konta: ' + (result.error || resp.status);
    errEl.style.display = 'block';
    return;
  }
  document.getElementById('newImie').value = '';
  document.getElementById('newNazwisko').value = '';
  document.getElementById('newHaslo').value = '';
  loadAccounts();
});
</script>
</body>
</html>
