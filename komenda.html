<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SWD PSP - Komenda</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  .acc-table { width: 100%; border-collapse: collapse; margin-top: 14px; }
  .acc-table th, .acc-table td { text-align: left; padding: 8px; border-bottom: 1px solid #d6dee1; font-size: 13px; }
  .acc-table th { color: #607078; font-size: 11px; text-transform: uppercase; }
  .acc-table select { padding: 4px; font-size: 12px; }
  .del-btn { background: #c0392b; color: #fff; border: none; border-radius: 3px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .add-card { background: #fff; border: 1px solid #b7c6cc; border-radius: 6px; padding: 14px; margin-top: 16px; }
  .add-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>

<div class="appbar">
  <div>
    <div class="title">Komenda - Panel admina</div>
    <div class="sub" id="whoAmI"></div>
  </div>
  <button class="logout" onclick="location.href='index.html'">Wróć do menu</button>
</div>

<div class="screen" style="max-width:720px;">
  <div id="guardMsg" class="empty" style="display:none;">Brak dostępu - zaloguj się jako admin.</div>

  <div id="adminPanel" style="display:none;">
    <h2 style="font-size:16px; color:#14394d;">Konta użytkowników</h2>
    <table class="acc-table" id="accTable">
      <thead>
        <tr><th>Imię</th><th>Nazwisko</th><th>Stopień</th><th>Rola</th><th></th></tr>
      </thead>
      <tbody id="accTableBody"></tbody>
    </table>

    <div class="add-card">
      <h2 style="font-size:14px; color:#14394d; margin-top:0;">Dodaj nowe konto</h2>
      <div class="add-row">
        <div>
          <label>Imię</label>
          <input type="text" id="newImie">
        </div>
        <div>
          <label>Nazwisko</label>
          <input type="text" id="newNazwisko">
        </div>
        <div>
          <label>Stopień</label>
          <select id="newStopien">
            <option>strażak</option>
            <option>starszy strażak</option>
            <option>sekcyjny</option>
            <option>starszy sekcyjny</option>
            <option>młodszy ogniomistrz</option>
            <option>ogniomistrz</option>
            <option>starszy ogniomistrz</option>
            <option>młodszy aspirant</option>
            <option>aspirant</option>
            <option>starszy aspirant</option>
            <option>aspirant sztabowy</option>
            <option>podporucznik</option>
            <option>porucznik</option>
            <option>kapitan</option>
            <option>młodszy brygadier</option>
            <option>brygadier</option>
            <option>starszy brygadier</option>
          </select>
        </div>
        <div>
          <label>Hasło</label>
          <input type="text" id="newHaslo">
        </div>
        <div>
          <label>Rola</label>
          <select id="newRola">
            <option value="user">Użytkownik</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div style="margin-top:14px;">
        <button class="btn" id="addAccBtn">Dodaj konto</button>
      </div>
      <div class="error-text" id="addError" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
const STOPNIE = ["strażak","starszy strażak","sekcyjny","starszy sekcyjny","młodszy ogniomistrz","ogniomistrz",
  "starszy ogniomistrz","młodszy aspirant","aspirant","starszy aspirant","aspirant sztabowy",
  "podporucznik","porucznik","kapitan","młodszy brygadier","brygadier","starszy brygadier"];

function getSession() {
  try { return JSON.parse(sessionStorage.getItem('swd_user') || 'null'); }
  catch (e) { return null; }
}

const user = getSession();
if (!user || user.rola !== 'admin') {
  document.getElementById('guardMsg').style.display = 'block';
} else {
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('whoAmI').textContent = 'Zalogowano jako: ' + user.imie + ' ' + user.nazwisko + ' (' + user.stopien + ')';
  loadAccounts();
}

async function loadAccounts() {
  const { data, error } = await sb.from('accounts').select('*').order('nazwisko');
  const tbody = document.getElementById('accTableBody');
  tbody.innerHTML = '';
  if (error) {
    tbody.innerHTML = '<tr><td colspan="5">Błąd wczytywania kont.</td></tr>';
    return;
  }
  data.forEach(acc => {
    const tr = document.createElement('tr');

    const stopienOptions = STOPNIE.map(s =>
      `<option value="${s}" ${s === acc.stopien ? 'selected' : ''}>${s}</option>`
    ).join('');

    tr.innerHTML = `
      <td>${acc.imie}</td>
      <td>${acc.nazwisko}</td>
      <td><select data-id="${acc.id}" class="stopienSelect">${stopienOptions}</select></td>
      <td>${acc.rola}</td>
      <td><button class="del-btn" data-id="${acc.id}">Usuń</button></td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll('.stopienSelect').forEach(sel => {
    sel.addEventListener('change', async () => {
      const id = sel.getAttribute('data-id');
      await sb.from('accounts').update({ stopien: sel.value }).eq('id', id);
    });
  });
  tbody.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Na pewno usunąć to konto?')) return;
      const id = btn.getAttribute('data-id');
      await sb.from('accounts').delete().eq('id', id);
      loadAccounts();
    });
  });
}

document.getElementById('addAccBtn').addEventListener('click', async () => {
  const imie = document.getElementById('newImie').value.trim();
  const nazwisko = document.getElementById('newNazwisko').value.trim();
  const stopien = document.getElementById('newStopien').value;
  const haslo = document.getElementById('newHaslo').value;
  const rola = document.getElementById('newRola').value;
  const errEl = document.getElementById('addError');
  errEl.style.display = 'none';

  if (!imie || !nazwisko || !haslo) {
    errEl.textContent = 'Wypełnij imię, nazwisko i hasło.';
    errEl.style.display = 'block';
    return;
  }

  const { error } = await sb.from('accounts').insert({ imie, nazwisko, stopien, haslo, rola });
  if (error) {
    errEl.textContent = 'Błąd dodawania konta.';
    errEl.style.display = 'block';
    return;
  }
  document.getElementById('newImie').value = '';
  document.getElementById('newNazwisko').value = '';
  document.getElementById('newHaslo').value = '';
  loadAccounts();
});
</script>
</body>
</html>
