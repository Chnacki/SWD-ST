<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SWD PSP - Punkt Alarmowy</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
</head>
<body>

<!-- RADIOTELEFON -->
<div class="radio-status-line" id="radioStatusLine">Kanał: ---</div>
<div class="radio-widget" id="radioWidget">
  <img src="radiotelefon.jpg" class="radio-img" alt="Radiotelefon">
  <div class="radio-hit power-btn" id="radioPowerBtn"></div>
  <div class="radio-hit arrow-up" id="radioChUp"></div>
  <div class="radio-hit arrow-down" id="radioChDown"></div>
  <div class="radio-screen-num" id="radioChNum">Ch: ---</div>
  <div class="radio-screen-name" id="radioChName">---</div>
</div>
<button class="ptt-btn" id="pttBtn">PTT</button>
<audio id="radioOnSound" src="radio_on.mp3" preload="auto"></audio>


<div class="statusbar"><span id="sb-clock">--:--</span><span>SWD-ST · Punkt Alarmowy</span></div>

<div class="appbar">
  <div>
    <div class="title">SWD PSP - Punkt Alarmowy</div>
    <div class="sub"><span class="dot"></span>Połączono z bazą</div>
  </div>
</div>

<div class="screen">

  <!-- MENU -->
  <div id="screen-menu">
    <div class="tiles">
      <div class="tile amber" onclick="openScreen('zadysponuj')">
        <svg class="icon" viewBox="0 0 24 24" fill="#a6750c"><path d="M12 2 2 7l10 5 10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#a6750c" fill="none" stroke-width="1.5"/></svg>
        <div class="label">Zadysponuj</div>
      </div>
      <div class="tile" onclick="openScreen('statusy')">
        <svg class="icon" viewBox="0 0 24 24" fill="#2e7d32"><path d="M5 21V4l14 7-14 7z"/></svg>
        <div class="label">Pokaż statusy</div>
      </div>
    </div>
  </div>

  <!-- ZADYSPONUJ -->
  <div id="screen-zadysponuj" style="display:none;">
    <div class="backlink" onclick="openScreen('menu')">‹ Wstecz</div>
    <h2 style="font-size:15px;color:#14394d;">Zadysponuj zdarzenie</h2>

    <label>Wozy do wyboru</label>
    <div class="checks" id="vehicleChecks"></div>

    <label>Kategoria zdarzenia</label>
    <select id="evCategory">
      <option value="P">P - Pożar</option>
      <option value="MZ">MZ - Miejscowe zagrożenie</option>
      <option value="IZM">IZM - Izolowane zdarzenie medyczne</option>
      <option value="CW">CW - Ćwiczenia</option>
    </select>

    <label>Nazwa zdarzenia</label>
    <input type="text" id="evName" placeholder="np. Pożar sadzy w kominie">

    <label>Adres</label>
    <input type="text" id="evAddress" placeholder="Ulica, numer, miejscowość">

    <label>Opis</label>
    <textarea id="evDesc" placeholder="Dodatkowe informacje dla zadysponowanych wozów"></textarea>

    <div style="margin-top:16px;">
      <button class="btn" onclick="submitDispatch()">Zadysponuj</button>
    </div>
    <div id="dispatchMsg" style="margin-top:10px;font-size:13px;"></div>
  </div>

  <!-- POKAŻ STATUSY -->
  <div id="screen-statusy" style="display:none;">
    <div class="backlink" onclick="openScreen('menu')">‹ Wstecz</div>
    <h2 style="font-size:15px;color:#14394d;">Statusy zdarzenia</h2>
    <label>Zdarzenie</label>
    <select id="eventSelect" onchange="renderStatuses()"></select>
    <div id="statusList" style="margin-top:14px;"></div>
  </div>

</div>

<script>
let realtimeChannel = null;

setInterval(() => {
  const d = new Date();
  document.getElementById('sb-clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}, 1000);

function fmtStamp(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(-2);
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  return `${dd}-${mm}-${yy} / ${hh}:${mi}:${ss}`;
}

function openScreen(name) {
  ['menu','zadysponuj','statusy'].forEach(s => {
    document.getElementById('screen-' + s).style.display = (s === name) ? 'block' : 'none';
  });
  if (name === 'zadysponuj') loadVehicleChecks();
  if (name === 'statusy') loadEventSelect();
}

async function loadVehicleChecks() {
  const wrap = document.getElementById('vehicleChecks');
  wrap.innerHTML = 'Ładowanie...';
  const { data, error } = await sb.from('vehicles').select('id,name').eq('active', true).order('name');
  if (error || !data) { wrap.innerHTML = 'Błąd ładowania wozów.'; return; }
  wrap.innerHTML = data.map(v => `
    <label class="chip"><input type="checkbox" value="${v.id}" class="veh-check"> ${v.name}</label>
  `).join('');
}

async function submitDispatch() {
  const msgBox = document.getElementById('dispatchMsg');
  msgBox.textContent = '';
  const checked = [...document.querySelectorAll('.veh-check:checked')].map(c => c.value);
  const category = document.getElementById('evCategory').value;
  const name = document.getElementById('evName').value.trim();
  const address = document.getElementById('evAddress').value.trim();
  const description = document.getElementById('evDesc').value.trim();

  if (checked.length === 0 || !name || !address) {
    msgBox.style.color = '#c0392b';
    msgBox.textContent = 'Wybierz co najmniej jeden wóz oraz podaj nazwę i adres zdarzenia.';
    return;
  }

  const { data: numberData, error: numErr } = await sb.rpc('next_event_number');
  if (numErr) { msgBox.style.color = '#c0392b'; msgBox.textContent = 'Błąd numeracji zdarzenia: ' + numErr.message; return; }

  const { data: ev, error: evErr } = await sb.from('events').insert({
    number: numberData, category, name, address, description, status: 'aktywne'
  }).select().single();
  if (evErr) { msgBox.style.color = '#c0392b'; msgBox.textContent = 'Błąd zapisu zdarzenia: ' + evErr.message; return; }

  const rows = checked.map(vid => ({ event_id: ev.id, vehicle_id: vid }));
  const { error: dErr } = await sb.from('dispatches').insert(rows);
  if (dErr) { msgBox.style.color = '#c0392b'; msgBox.textContent = 'Błąd dysponowania: ' + dErr.message; return; }

  msgBox.style.color = '#2e7d32';
  msgBox.textContent = `Zadysponowano - Zdarzenie ${ev.number}`;
  document.getElementById('evName').value = '';
  document.getElementById('evAddress').value = '';
  document.getElementById('evDesc').value = '';
  document.querySelectorAll('.veh-check:checked').forEach(c => c.checked = false);
}

async function loadEventSelect() {
  const sel = document.getElementById('eventSelect');
  const { data, error } = await sb.from('events').select('*').order('created_at', { ascending: false }).limit(50);
  if (error || !data || data.length === 0) {
    sel.innerHTML = '<option>Brak zdarzeń</option>';
    document.getElementById('statusList').innerHTML = '<div class="empty">Brak zdarzeń do wyświetlenia.</div>';
    return;
  }
  sel.innerHTML = data.map(e => `<option value="${e.id}">Zdarzenie ${e.number} - (${e.category}) ${e.name}${e.status === 'zakonczone' ? ' [zakończone]' : ''}</option>`).join('');
  renderStatuses();
  subscribeRealtime();
}

async function renderStatuses() {
  const eventId = document.getElementById('eventSelect').value;
  const wrap = document.getElementById('statusList');
  if (!eventId) { wrap.innerHTML = ''; return; }
  const { data, error } = await sb
    .from('dispatches')
    .select('*, vehicles(name)')
    .eq('event_id', eventId)
    .order('created_at');
  if (error || !data || data.length === 0) {
    wrap.innerHTML = '<div class="empty">Brak wozów przypisanych do tego zdarzenia.</div>';
    return;
  }
  wrap.innerHTML = data.map(d => `
    <div class="event-card" style="cursor:default;">
      <div class="ev-head">${d.vehicles ? d.vehicles.name : 'Nieznany wóz'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:6px;margin-top:6px;">
        ${statusPill('Wyjazd', d.wyjazd, d.wyjazd_at)}
        ${statusPill('Na miejscu', d.na_miejscu, d.na_miejscu_at)}
        ${statusPill('Lokalizacja zdarzenia', d.nawiguj, d.nawiguj_at)}
        ${statusPill('Zakończenie działań', d.opanowana, d.opanowana_at)}
        ${statusPill('W bazie', d.w_bazie, d.w_bazie_at)}
      </div>
    </div>
  `).join('');
}

function statusPill(label, on, stamp) {
  const bg = on ? '#43a047' : '#eceff1';
  const color = on ? '#fff' : '#607078';
  return `<div style="background:${bg};color:${color};border-radius:4px;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;">
    ${label}${on && stamp ? `<div style="font-weight:400;font-size:10px;margin-top:4px;">${fmtStamp(stamp)}</div>` : ''}
  </div>`;
}

function subscribeRealtime() {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb.channel('punkt-alarmowy')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'dispatches' }, () => {
      if (document.getElementById('screen-statusy').style.display === 'block') renderStatuses();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, () => {
      if (document.getElementById('screen-statusy').style.display === 'block') loadEventSelect();
    })
    .subscribe();
}

// ==========================================================
// RADIOTELEFON
// ==========================================================
const RADIO_CHANNELS = [
  { num: "020", name: "POWIATOWY", key: "powiatowy" },
  { num: "004", name: "KRG 1", key: "krg1" },
  { num: "035", name: "KRG 3", key: "krg3" },
  { num: "039", name: "KRG 4", key: "krg4" },
  { num: "041", name: "KRG 5", key: "krg5" },
  { num: "046", name: "KRG 6", key: "krg6" },
  { num: "047", name: "KRG 7", key: "krg7" },
  { num: "049", name: "KRG 8", key: "krg8" }
];
let radioOn = false;
let radioChannelIndex = 0;
let radioPowerTimer = null;
let radioLongPress = false;
let radioTransmitting = false;

// --- WebRTC / audio na żywo ---
const radioClientId = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random()));
let radioLocalStream = null;
let radioPeers = {};
let radioSupaChannel = null;

async function radioEnsureMic() {
  if (radioLocalStream) return true;
  try {
    radioLocalStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    radioLocalStream.getAudioTracks().forEach(t => t.enabled = false);
    return true;
  } catch (e) {
    alert('Brak dostępu do mikrofonu - radio wymaga zgody przeglądarki na mikrofon.');
    return false;
  }
}

function radioGetOrCreatePeer(peerId) {
  if (radioPeers[peerId]) return radioPeers[peerId].pc;
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  if (radioLocalStream) radioLocalStream.getTracks().forEach(t => pc.addTrack(t, radioLocalStream));
  pc.onicecandidate = (e) => { if (e.candidate) radioSendSignal(peerId, { type: 'ice', candidate: e.candidate }); };
  pc.ontrack = (e) => radioPlayRemote(peerId, e.streams[0]);
  radioPeers[peerId] = { pc, audioEl: null };
  return pc;
}

function radioPlayRemote(peerId, stream) {
  const entry = radioPeers[peerId];
  if (!entry) return;
  if (!entry.audioEl) {
    const audioEl = document.createElement('audio');
    audioEl.autoplay = true;
    document.body.appendChild(audioEl);
    entry.audioEl = audioEl;
  }
  entry.audioEl.srcObject = stream;
}

function radioRemovePeer(peerId) {
  const entry = radioPeers[peerId];
  if (!entry) return;
  entry.pc.close();
  if (entry.audioEl) entry.audioEl.remove();
  delete radioPeers[peerId];
}

function radioSendSignal(to, data) {
  if (!radioSupaChannel) return;
  radioSupaChannel.send({ type: 'broadcast', event: 'signal', payload: { to, from: radioClientId, data } });
}

async function radioHandleSignal(payload) {
  if (payload.to !== radioClientId) return;
  const { from, data } = payload;
  const pc = radioGetOrCreatePeer(from);
  if (data.type === 'offer') {
    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    radioSendSignal(from, { type: 'answer', sdp: answer });
  } else if (data.type === 'answer') {
    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
  } else if (data.type === 'ice') {
    try { await pc.addIceCandidate(data.candidate); } catch (e) {}
  }
}

async function radioCreateOfferTo(peerId) {
  const pc = radioGetOrCreatePeer(peerId);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  radioSendSignal(peerId, { type: 'offer', sdp: offer });
}

async function radioLeaveChannel() {
  Object.keys(radioPeers).forEach(radioRemovePeer);
  if (radioSupaChannel) {
    try { await radioSupaChannel.untrack(); } catch (e) {}
    try { await sb.removeChannel(radioSupaChannel); } catch (e) {}
    radioSupaChannel = null;
  }
}

async function radioJoinChannel(channelKey) {
  await radioLeaveChannel();
  const ok = await radioEnsureMic();
  if (!ok) return;
  const channel = sb.channel('radio-' + channelKey, { config: { presence: { key: radioClientId } } });
  channel.on('broadcast', { event: 'signal' }, ({ payload }) => radioHandleSignal(payload));
  channel.on('presence', { event: 'sync' }, () => {
    const state = channel.presenceState();
    const ids = Object.keys(state).filter(id => id !== radioClientId);
    ids.forEach(id => {
      if (!radioPeers[id]) {
        if (radioClientId < id) radioCreateOfferTo(id);
        else radioGetOrCreatePeer(id);
      }
    });
    Object.keys(radioPeers).forEach(id => { if (!ids.includes(id)) radioRemovePeer(id); });
  });
  await channel.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') await channel.track({ id: radioClientId });
  });
  radioSupaChannel = channel;
}

const radioWidget = document.getElementById('radioWidget');
const radioChName = document.getElementById('radioChName');
const radioChNum = document.getElementById('radioChNum');
const radioStatusLine = document.getElementById('radioStatusLine');
const radioOnSound = document.getElementById('radioOnSound');
const pttBtn = document.getElementById('pttBtn');

function renderRadio() {
  if (!radioOn) {
    radioChName.textContent = '---';
    radioChNum.textContent = 'Ch: ---';
    radioWidget.classList.remove('radio-on');
    radioStatusLine.textContent = 'Radio wyłączone';
    radioStatusLine.classList.remove('tx');
  } else {
    const ch = RADIO_CHANNELS[radioChannelIndex];
    radioChName.textContent = ch.name;
    radioChNum.textContent = 'Ch: ' + ch.num;
    radioWidget.classList.add('radio-on');
    if (!radioTransmitting) {
      radioStatusLine.textContent = 'Kanał: ' + ch.name;
      radioStatusLine.classList.remove('tx');
    }
  }
}

function radioTurnOn() {
  radioOn = true;
  renderRadio();
  try { radioOnSound.currentTime = 0; radioOnSound.play(); } catch (e) {}
  radioJoinChannel(RADIO_CHANNELS[radioChannelIndex].key);
}
function radioTurnOff() {
  radioOn = false;
  radioStopTransmit();
  renderRadio();
  radioLeaveChannel();
}

document.getElementById('radioPowerBtn').addEventListener('mousedown', radioPowerStart);
document.getElementById('radioPowerBtn').addEventListener('touchstart', radioPowerStart, { passive: true });
document.getElementById('radioPowerBtn').addEventListener('mouseup', radioPowerEnd);
document.getElementById('radioPowerBtn').addEventListener('mouseleave', radioPowerCancel);
document.getElementById('radioPowerBtn').addEventListener('touchend', radioPowerEnd);

function radioPowerStart() {
  radioLongPress = false;
  if (radioOn) {
    radioPowerTimer = setTimeout(() => { radioLongPress = true; radioTurnOff(); }, 600);
  }
}
function radioPowerEnd() {
  clearTimeout(radioPowerTimer);
  if (!radioOn && !radioLongPress) radioTurnOn();
}
function radioPowerCancel() {
  clearTimeout(radioPowerTimer);
}

document.getElementById('radioChUp').addEventListener('click', () => {
  if (!radioOn) return;
  radioChannelIndex = (radioChannelIndex + 1) % RADIO_CHANNELS.length;
  renderRadio();
  radioJoinChannel(RADIO_CHANNELS[radioChannelIndex].key);
});
document.getElementById('radioChDown').addEventListener('click', () => {
  if (!radioOn) return;
  radioChannelIndex = (radioChannelIndex - 1 + RADIO_CHANNELS.length) % RADIO_CHANNELS.length;
  renderRadio();
  radioJoinChannel(RADIO_CHANNELS[radioChannelIndex].key);
});

function radioStartTransmit() {
  if (!radioOn || radioTransmitting) return;
  radioTransmitting = true;
  if (radioLocalStream) radioLocalStream.getAudioTracks().forEach(t => t.enabled = true);
  radioWidget.classList.add('transmitting');
  pttBtn.classList.add('active');
  radioStatusLine.classList.add('tx');
  radioStatusLine.textContent = 'NADAJESZ: ' + RADIO_CHANNELS[radioChannelIndex].name;
}
function radioStopTransmit() {
  radioTransmitting = false;
  if (radioLocalStream) radioLocalStream.getAudioTracks().forEach(t => t.enabled = false);
  radioWidget.classList.remove('transmitting');
  pttBtn.classList.remove('active');
  renderRadio();
}

pttBtn.addEventListener('mousedown', radioStartTransmit);
pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); radioStartTransmit(); }, { passive: false });
pttBtn.addEventListener('mouseup', radioStopTransmit);
pttBtn.addEventListener('mouseleave', radioStopTransmit);
pttBtn.addEventListener('touchend', radioStopTransmit);

document.addEventListener('keydown', (e) => {
  if (e.key !== '`') return;
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  e.preventDefault();
  radioStartTransmit();
});
document.addEventListener('keyup', (e) => {
  if (e.key !== '`') return;
  radioStopTransmit();
});

renderRadio();

openScreen('menu');
</script>
</body>
</html>
